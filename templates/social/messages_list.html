{% extends 'base.html' %}

{% block title %}Messages{% endblock %}

{% block content %}
<div class="page-container">
    <h1 style="color: var(--text-light); font-size: 2.5rem; font-weight: 800; margin-bottom: 2rem;">Messages</h1>
    
    <div style="max-width: 600px; margin: 0 auto;">
        {% for user in users %}
            <a href="{% url 'social:conversation' user.pk %}" style="display: flex; align-items: center; gap: 1rem; padding: 1rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 0.75rem; margin-bottom: 0.5rem; text-decoration: none;">
                <div style="width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #0a8fc7); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: white; font-weight: 700;">
                    {{ user.username|first|upper }}
                </div>
                <div>
                    <h3 style="color: var(--text-light); margin-bottom: 0.25rem;">{{ user.username }}</h3>
                    <p style="color: rgba(255,255,255,0.5); font-size: 0.875rem;">Click to view conversation</p>
                </div>
            </a>
        {% empty %}
            <p style="color: rgba(255,255,255,0.6); text-align: center; padding: 3rem;">No messages yet.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
