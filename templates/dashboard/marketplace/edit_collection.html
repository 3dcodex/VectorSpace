{% extends 'dashboard_base.html' %}

{% block title %}Edit Collection{% endblock %}

{% block dashboard_content %}
<div class="container py-4" style="max-width: 800px;">
    <h2 class="h4 mb-3">Edit Collection</h2>
    <form method="post" class="card card-body">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" name="name" value="{{ collection.name }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" name="description" rows="4">{{ collection.description }}</textarea>
        </div>
        <div class="form-check mb-3">
            <input type="checkbox" class="form-check-input" name="is_public" id="isPublic" {% if collection.is_public %}checked{% endif %}>
            <label class="form-check-label" for="isPublic">Public collection</label>
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
    </form>
</div>
{% endblock %}
