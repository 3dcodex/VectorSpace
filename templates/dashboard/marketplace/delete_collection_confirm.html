{% extends 'dashboard_base.html' %}

{% block title %}Delete Collection{% endblock %}

{% block dashboard_content %}
<div class="container py-4" style="max-width: 700px;">
    <div class="card card-body">
        <h2 class="h5">Delete "{{ collection.name }}"?</h2>
        <p class="text-muted">This will remove {{ item_count }} items from this collection.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'dashboard:dashboard_marketplace_my_collections' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
