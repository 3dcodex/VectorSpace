{% extends 'dashboard_base.html' %}

{% block title %}My Postings{% endblock %}

{% block dashboard_content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h4 mb-0">My Job Postings</h2>
        <a href="{% url 'dashboard:dashboard_jobs_post' %}" class="btn btn-primary">New Job</a>
    </div>
    {% if jobs %}
    <ul class="list-group">
        {% for job in jobs %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            <span>{{ job.title }}</span>
            <a href="{% url 'dashboard:dashboard_jobs_applicants_detail' job.pk %}" class="btn btn-sm btn-outline-secondary">Applicants</a>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <div class="alert alert-info">No job postings yet.</div>
    {% endif %}
</div>
{% endblock %}
