{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} - Vector Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0a0e27 0%,#1a1f3a 100%);color:#fff;min-height:100vh}
        .dashboard-wrapper{display:flex;min-height:100vh}
        .sidebar{width:260px;background:rgba(255,255,255,0.03);border-right:1px solid rgba(255,255,255,0.1);padding:2rem 0}
        .sidebar-logo{padding:0 1.5rem 2rem;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:1.5rem}
        .sidebar-logo h2{font-size:1.25rem;color:#0db9f2}
        .sidebar-nav{list-style:none}
        .sidebar-nav li{margin-bottom:0.25rem}
        .sidebar-nav a{display:flex;align-items:center;padding:0.75rem 1.5rem;color:rgba(255,255,255,0.6);text-decoration:none;transition:all 0.2s;font-size:0.875rem}
        .sidebar-nav a:hover,.sidebar-nav a.active{background:rgba(13,185,242,0.1);color:#0db9f2}
        .sidebar-nav a span{margin-right:0.75rem;font-size:1.25rem}
        .dashboard-content{flex:1;padding:2rem 3rem;overflow-y:auto}
        .dashboard-header{margin-bottom:2rem}
        .dashboard-header h1{font-size:2rem;margin-bottom:0.5rem}
        .dashboard-header p{color:rgba(255,255,255,0.6)}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem;margin-bottom:3rem}
        .stat-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:1rem;padding:1.5rem}
        .stat-card h2{font-size:2rem;color:#0db9f2;margin-bottom:0.5rem}
        .stat-card p{color:rgba(255,255,255,0.6);font-size:0.875rem}
        .section{margin-bottom:3rem}
        .section h2{font-size:1.5rem;margin-bottom:1.5rem}
        .card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:1rem;padding:1.5rem;margin-bottom:1rem}
        .card h3{font-size:1.125rem;margin-bottom:0.5rem}
        .card p{color:rgba(255,255,255,0.6);font-size:0.875rem}
        .btn{display:inline-block;padding:0.75rem 1.5rem;background:#0db9f2;color:#0a0e27;text-decoration:none;border-radius:0.5rem;font-weight:600;transition:all 0.2s;border:none;cursor:pointer}
        .btn:hover{background:#0a8fc7;transform:translateY(-2px)}
        .btn-secondary{background:rgba(255,255,255,0.1);color:#fff}
        .btn-secondary:hover{background:rgba(255,255,255,0.15)}
        .empty-state{text-align:center;padding:3rem;color:rgba(255,255,255,0.5)}
        .empty-state h3{font-size:1.25rem;margin-bottom:0.5rem;color:#fff}
        @media(max-width:768px){.sidebar{display:none}.dashboard-content{padding:1.5rem}}
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h2>Vector Space</h2>
            </div>
            <ul class="sidebar-nav">
                {% block sidebar %}{% endblock %}
                <li><a href="{% url 'home' %}"><span>🏠</span> Home</a></li>
                <li><a href="{% url 'users:logout' %}"><span>🚪</span> Logout</a></li>
            </ul>
        </aside>
        
        <main class="dashboard-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
